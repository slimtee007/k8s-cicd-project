<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
    <title>Production GitOps Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: #e9e9e9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #16213e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-top: 5px solid #0f3460; text-align: center; }
        .status-badge { background: #00d2ad; color: #1a1a2e; padding: 5px 15px; border-radius: 20px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        h1 { color: #4ecca3; margin-top: 1rem; }
        .details { margin: 20px 0; text-align: left; background: #0f3460; padding: 15px; border-radius: 8px; }
        code { color: #f2a365; }
    </style>
</head>
<body>
    <div class="card">
        <span class="status-badge">System Healthy</span>
        <h1>Infrastructure Linked</h1>
        <div class="details">
            <p>🌐 <strong>Web Tier:</strong> Nginx Cluster (Auto-scaled)</p>
            <p>🗄️ <strong>Data Tier:</strong> <code>postgres-service</code></p>
            <p>🛡️ <strong>Security:</strong> K8s Secrets Injected</p>
        </div>
        <p style="font-size: 0.8rem; opacity: 0.6;">Build Verified at: 2026-04-02</p>
    </div>
</body>
</html>
