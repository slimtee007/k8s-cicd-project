apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metrics-app
  template:
    metadata:
      labels:
        app: metrics-app
    spec:
      containers:
      - name: metrics-app
        image: slimtee/metrics-app:latest # Change this!
        ports:
        - containerPort: 5000
        env:
        - name: DB_HOST
          value: "postgres-service"
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-service
spec:
  type: NodePort
  selector:
    app: metrics-app
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30080
